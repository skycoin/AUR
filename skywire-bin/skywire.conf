# /etc/skywire.conf — read by `skywire autoconfig`.
#
# Standard package install. PKGENV=true makes config-gen write to
# /opt/skywire/skywire.json; SKYWIRE_USER pins the unit's User= via
# an autoconfig-managed systemd drop-in at
# /etc/systemd/system/skywire.service.d/skywire-user.conf and chowns
# /opt/skywire to match.

PKGENV=true
SKYWIRE_USER=_skywire

# Run as the operator's own user instead. Comment out PKGENV +
# SKYWIRE_USER above and uncomment the next two lines, then run
# `skywire autoconfig` from your shell and `systemctl --user enable
# --now skywire`.
#USRENV=true

# Or chain to a per-user file (one level of redirect honoured):
#SKYENV=/home/youruser/.config/skywire.conf

# Common knobs honoured by `skywire-cli config gen` — uncomment as
# needed. Anything not listed here, see `skywire cli config gen --help`.
#HYPERVISORPKS=('02abc...')         # remote hypervisors that control this visor
#ISHYPERVISOR=true                  # run a local hypervisor on this visor
#REWARDSKYADDR='2...skycoinaddress' # reward address for transport rewards
#VISORISPUBLIC=true                 # advertise this visor as public
#VPNSERVER=true                     # auto-start vpn-server app
#BESTPROTO=true                     # prefer fastest transport in route discovery
